<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>管理システム</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <style>
    body { background-color: #f8f9fa; }
    .view-section { display: none; }
    .view-section.active { display: block; }
    .thumbnail-img { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; }
    .preview-item { display: inline-flex; flex-direction: column; align-items: center; margin: 5px; width: 110px; position: relative; vertical-align: top; }
    .preview-item input { width: 100%; margin-top: 5px; font-size: 0.8rem; padding: 4px 5px; text-align: center; border-radius: 4px; border: 1px solid #ccc; }
    .preview-img { width: 100px; height: 100px; object-fit: cover; border-radius: 5px; }
    .btn-delete-img { position: absolute; top: -5px; right: -5px; padding: 0 5px; border-radius: 50%; z-index: 5; }
    .loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 9999; justify-content: center; align-items: center; color: white; flex-direction: column; }
    #init-splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #f8f9fa; z-index: 10020; display: flex; justify-content: center; align-items: center; flex-direction: column; }
    #toast-container { position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); background: rgba(40, 167, 69, 0.95); color: white; padding: 1rem 2rem; border-radius: 30px; font-weight: bold; font-size: 1.1rem; z-index: 10010; transition: bottom 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55); box-shadow: 0 10px 25px rgba(0,0,0,0.2); pointer-events: none; width: 90%; max-width: 400px; text-align: center; }
    .status-badge { position: absolute; top: 12px; left: -6px; font-size: 0.9rem; font-weight: bold; padding: 0.4rem 1.2rem; box-shadow: 2px 4px 8px rgba(0,0,0,0.3); transform: rotate(-5deg); z-index: 10; border-radius: 4px; letter-spacing: 1px; color: white; }
    .btn { transition: all 0.3s ease !important; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1) !important; border-radius: 10px !important; border: none !important; }
    .btn:hover { box-shadow: 0 8px 15px rgba(0, 0, 0, 0.2) !important; transform: translateY(-2px) !important; }
    .btn-primary { background: linear-gradient(135deg, #4dabf7, #1971c2) !important; color: white !important; }
    .btn-danger { background: linear-gradient(135deg, #ff8787, #e03131) !important; color: white !important; }
    .btn-success { background: linear-gradient(135deg, #69db7c, #2f9e44) !important; color: white !important; }
    .btn-secondary { background: linear-gradient(135deg, #ced4da, #adb5bd) !important; color: white !important; }
    .form-control-huge { padding: 1.8rem 1rem !important; font-size: 1.8rem !important; border-radius: 8px !important; }
    .search-input-huge { padding: 1.4rem !important; font-size: 1.4rem !important; border-radius: 12px 0 0 12px !important; }
    .btn-search-huge { padding: 1.4rem 2rem !important; font-size: 1.4rem !important; font-weight: bold !important; border-radius: 0 12px 12px 0 !important; }
    .btn-admin-huge { padding: 1.5rem 0 !important; font-size: 1.6rem !important; font-weight: bold !important; border-radius: 12px !important; }
    .btn-login-huge { padding: 2.5rem 1rem !important; font-size: 2.2rem !important; font-weight: bold !important; border-radius: 15px !important; background: linear-gradient(135deg, #0d6efd, #00c6ff) !important; color: white !important; box-shadow: 0 8px 15px rgba(13, 110, 253, 0.3) !important; }
    .custom-alert-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 10050; justify-content: center; align-items: center; padding: 20px; }
    .custom-alert-box { background: #fff; padding: 2.5rem; border-radius: 15px; width: 100%; max-width: 400px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); text-align: center; }
    .filter-section-title { font-size: 0.95rem; font-weight: bold; color: #555; margin-bottom: 0.3rem; border-bottom: 2px solid #ddd; padding-bottom: 0.2rem; }
    .filter-btn { border-radius: 20px !important; font-weight: bold !important; padding: 0.4rem 1rem !important; font-size: 0.9rem !important; margin-bottom: 0.4rem; background-color: white !important; color: #6c757d !important; border: 1px solid #ced4da !important; }
    .filter-btn.active { background: linear-gradient(135deg, #4dabf7, #1971c2) !important; color: white !important; border: none !important; box-shadow: inset 0 3px 5px rgba(0,0,0,0.2) !important; }
    .filter-btn-group { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 1rem; }
    .quick-edit-btn:hover { background-color: #e9ecef !important; transform: scale(1.1) !important; }
    .fav-btn { transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    .fav-btn:active { transform: scale(0.8); }
    @media (max-width: 768px) {
      .search-input-huge { padding: 1rem !important; font-size: 1rem !important; border-radius: 8px 0 0 8px !important; }
      .btn-search-huge { padding: 1rem 1.5rem !important; font-size: 1.1rem !important; border-radius: 0 8px 8px 0 !important; }
      .btn-admin-huge { padding: 1rem 0 !important; font-size: 1.1rem !important; border-radius: 8px !important; }
      .form-control-huge { padding: 1rem !important; font-size: 1.2rem !important; }
      .btn-login-huge { padding: 1.8rem 1rem !important; font-size: 1.6rem !important; }
      .filter-btn { font-size: 0.85rem !important; padding: 0.3rem 0.8rem !important; }
    }
  </style>
</head>
<body>

<div id="init-splash">
  <div class="spinner-border text-primary" role="status" style="width: 4rem; height: 4rem;"></div>
  <h4 class="mt-4 fw-bold text-secondary">システムを起動中...</h4>
</div>

<div class="loading-overlay" id="loading">
  <div class="spinner-border" role="status" style="width: 3rem; height: 3rem;"></div>
  <h5 class="mt-3 font-weight-bold" id="loading-text">処理中...</h5>
</div>

<div id="toast-container">
  <i class="bi bi-check-circle-fill me-2"></i><span id="toast-message">保存しました</span>
</div>

<div id="custom-alert" class="custom-alert-overlay">
  <div class="custom-alert-box">
    <p id="custom-alert-message" class="mb-4" style="font-size: 1.2rem; font-weight: bold; color: #333; white-space: pre-wrap; line-height: 1.6; word-break: break-all;"></p>
    <button class="btn btn-primary w-100" style="padding: 1.2rem; font-size: 1.4rem; font-weight: bold;" onclick="app.closeAlert()">OK</button>
  </div>
</div>

<nav class="navbar navbar-dark bg-primary" style="background: linear-gradient(135deg, #4dabf7, #1971c2) !important;">
  <div class="container-fluid">
    <span class="navbar-brand mb-0 h1" id="nav-title" onclick="app.goHome()" style="cursor:pointer; font-weight: bold;">管理システム</span>
    <button class="btn btn-sm btn-outline-light" id="btn-logout" style="display:none;" onclick="app.logout()">ログアウト</button>
  </div>
</nav>

<div class="container mt-4 mb-5">

  <div id="view-login" class="view-section">
    <div class="row justify-content-center">
      <div class="col-md-7 mt-5">
        <div class="card shadow-sm" style="border-radius: 15px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.1) !important;">
          <div class="card-body p-4 p-md-5">
            <h4 class="card-title text-center mb-4 mb-md-5" style="font-weight: bold;">管理者用 隠しログイン扉</h4>
            <div class="mb-4">
              <label class="form-label font-weight-bold">ログインID</label>
              <input type="text" id="login-id" inputmode="email" autocapitalize="off" class="form-control form-control-huge" placeholder="半角英数字で入力">
            </div>
            <div class="mb-5">
              <label class="form-label font-weight-bold">パスワード</label>
              <div class="input-group">
                <input type="password" id="login-pass" class="form-control form-control-huge">
                <button class="btn btn-secondary" type="button" onclick="app.togglePassword()" style="border-radius: 0 8px 8px 0 !important; padding: 0 1.5rem;">
                  <i class="bi bi-eye" id="toggle-password-icon" style="font-size: 1.8rem;"></i>
                </button>
              </div>
            </div>
            <div class="d-grid gap-4 mt-5">
              <button class="btn btn-login-huge w-100" onclick="app.login()">ログインして管理画面へ</button>
              <button class="btn btn-secondary btn-back-huge w-100" onclick="app.setRole('customer')">お客様画面に戻る</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="view-list" class="view-section">
    <div class="d-flex flex-column mb-3 gap-3">
      <div class="d-flex gap-2">
        <div class="input-group flex-grow-1">
          <input type="text" id="search-input" class="form-control search-input-huge" placeholder="商品名、サイズ、備考で検索" onkeyup="if(event.key==='Enter') app.doSearch();">
          <button class="btn btn-secondary btn-search-huge" onclick="app.doSearch()">検索</button>
        </div>
        <select id="sort-select" class="form-select form-select-lg" style="width: auto; border-radius: 12px; font-weight: bold; color: #495057; border: 2px solid #ced4da;" onchange="app.doSort()">
          <option value="new">新着順</option>
          <option value="asc">名称: 昇順</option>
          <option value="desc">名称: 降順</option>
        </select>
      </div>
      <div>
        <div class="filter-section-title">品目</div>
        <div class="filter-btn-group" id="type-filters"></div>
      </div>
      <div>
        <div class="filter-section-title">長さ</div>
        <div class="filter-btn-group" id="length-filters">
          <button class="btn filter-btn active" onclick="app.filterByLength('all', this)">すべて</button>
          <button class="btn filter-btn" onclick="app.filterByLength('under1', this)">1m未満</button>
          <button class="btn filter-btn" onclick="app.filterByLength('1to3', this)">1m〜3m</button>
          <button class="btn filter-btn" onclick="app.filterByLength('3to5', this)">3m〜5m</button>
          <button class="btn filter-btn" onclick="app.filterByLength('over5', this)">5m以上</button>
        </div>
      </div>

      <div id="admin-controls" style="display:none;" class="w-100 gap-2 mb-2">
        <button class="btn btn-success flex-grow-1 btn-admin-huge d-flex align-items-center justify-content-center" onclick="app.openEdit()">
          <i class="bi bi-plus-circle me-1"></i> 新規登録
        </button>
      </div>
    </div>
    <div class="row" id="product-list-container"></div>
  </div>

  <div id="view-detail" class="view-section">
    <div class="d-flex gap-2 mb-3">
      <button class="btn btn-secondary" style="padding: 1rem 1.5rem; font-weight: bold;" onclick="app.showView('view-list')">← 一覧に戻る</button>
      <button class="btn btn-primary admin-only flex-grow-1" style="display:none; padding: 1rem 1.5rem; font-weight: bold;" onclick="app.editCurrent()">この商品を編集</button>
    </div>
    <div class="card shadow-sm" style="border-radius: 15px; border: none;">
      <div class="card-body p-4">
        <div class="row">
          <div class="col-md-6">
            <div id="productCarousel" class="carousel slide" data-bs-ride="carousel">
              <div class="carousel-inner" id="carousel-inner-container"></div>
              <button class="carousel-control-prev" type="button" data-bs-target="#productCarousel" data-bs-slide="prev">
                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Previous</span>
              </button>
              <button class="carousel-control-next" type="button" data-bs-target="#productCarousel" data-bs-slide="next">
                <span class="carousel-control-next-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Next</span>
              </button>
            </div>
          </div>
          <div class="col-md-6 mt-4 mt-md-0 position-relative">
            <div id="detail-status-area" class="mb-2"></div>
            <div class="d-flex justify-content-between align-items-center mb-3">
              <h2 id="detail-name" style="font-weight: bold; margin:0;">商品名</h2>
              <button id="detail-fav-btn" class="btn btn-light rounded-pill shadow-sm fs-4 px-3 fav-btn" onclick="app.toggleFavorite(app.currentProduct.pinban, event)">
                <i class="bi bi-heart" id="detail-fav-icon"></i> <span id="detail-fav-count" class="ms-1" style="font-weight:bold;">0</span>
              </button>
            </div>
            <p class="text-muted">品番: <span id="detail-pinban"></span></p>
            <table class="table mt-3">
              <tbody>
                <tr><th style="width: 30%;">サイズ</th><td id="detail-size"></td></tr>
                <tr><th>ポイント</th><td id="detail-point"></td></tr>
                <tr><th>備考</th><td id="detail-remarks"></td></tr>
                <tr><th>更新者</th><td id="detail-account"></td></tr>
              </tbody>
            </table>
            <button class="btn w-100 mt-3 mb-4 text-white" style="border-radius:15px; font-weight:bold; font-size:1.2rem; background: linear-gradient(135deg, #f59f00, #f08c00); box-shadow: 0 4px 10px rgba(240, 140, 0, 0.3);" onclick="app.sendInquiry()">
              <i class="bi bi-envelope-paper-heart me-2"></i>この商品について問い合わせる
            </button>
            
            <div class="text-center mt-2">
              <h6 style="font-weight: bold; color: #555;">【商品QRコード】</h6>
              <div id="qrcode-display" class="d-inline-block p-3 bg-white border" style="border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05);"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="view-edit" class="view-section">
    <h3 id="edit-title" class="mb-4" style="font-weight: bold;">商品登録</h3>
    <div class="card shadow-sm" style="border-radius: 15px; border: none;">
      <div class="card-body p-4">
        <input type="hidden" id="edit-pinban">
        <div class="mb-4 p-3 border rounded bg-light">
          <label class="form-label font-weight-bold mb-2">販売状況 (ステータス)</label>
          <div class="d-flex gap-2 flex-wrap">
            <input type="radio" class="btn-check" name="edit-status" id="status-sale" value="販売中" autocomplete="off" checked>
            <label class="btn btn-outline-primary" for="status-sale"><i class="bi bi-shop me-1"></i>販売中</label>
            <input type="radio" class="btn-check" name="edit-status" id="status-nego" value="商談中" autocomplete="off">
            <label class="btn btn-outline-success" for="status-nego"><i class="bi bi-chat-dots me-1"></i>商談中</label>
            <input type="radio" class="btn-check" name="edit-status" id="status-sold" value="Sold Out" autocomplete="off">
            <label class="btn btn-outline-danger" for="status-sold"><i class="bi bi-x-circle me-1"></i>Sold Out</label>
            <input type="radio" class="btn-check" name="edit-status" id="status-archive" value="非公開" autocomplete="off">
            <label class="btn btn-outline-secondary" for="status-archive"><i class="bi bi-eye-slash me-1"></i>非公開 (アーカイブ)</label>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label font-weight-bold">商品名</label>
          <input type="text" id="edit-name" class="form-control form-control-lg" placeholder="未入力でも保存できます">
        </div>
        <div class="mb-3">
          <label class="form-label font-weight-bold">サイズ</label>
          <input type="text" id="edit-size" class="form-control form-control-lg" placeholder="例: 長さ4060mm×幅430mm×厚み73mm">
        </div>
        <div class="mb-3">
          <label class="form-label font-weight-bold">ポイント</label>
          <input type="text" id="edit-point" class="form-control form-control-lg">
        </div>
        <div class="mb-3">
          <label class="form-label font-weight-bold">備考</label>
          <textarea id="edit-remarks" class="form-control form-control-lg" rows="3"></textarea>
        </div>
        <div class="mb-4">
          <label class="form-label font-weight-bold">写真の追加と名称編集 (複数可)</label>
          <div class="d-flex gap-2 mb-3">
            <button type="button" class="btn btn-primary flex-grow-1 btn-photo-select" onclick="document.getElementById('input-camera').click()">
              <i class="bi bi-camera me-1"></i> カメラで撮影
            </button>
            <button type="button" class="btn btn-secondary flex-grow-1 btn-photo-select" onclick="document.getElementById('input-file').click()">
              <i class="bi bi-folder2-open me-1"></i> 端末から選択
            </button>
          </div>
          <input type="file" id="input-camera" accept="image/*" capture="environment" style="display:none;">
          <input type="file" id="input-file" accept="image/*" multiple style="display:none;">
          <small class="text-muted d-block mb-2">※大容量ファイルは自動的にリサイズされます。</small>
          <div id="image-preview-area" class="border p-3 rounded bg-light" style="min-height:120px; box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);"></div>
        </div>
        <div class="d-grid gap-3 mt-5">
          <button class="btn btn-success" style="padding: 1.5rem; font-size: 1.5rem; font-weight: bold;" onclick="app.saveProduct()">保存して反映する</button>
          <button class="btn btn-secondary" style="padding: 1.2rem; font-size: 1.2rem; font-weight: bold;" onclick="app.showView('view-list')">キャンセルして戻る</button>
        </div>
      </div>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
// ====================================================================
// ★ Vercelフロントエンド 最終完全版スクリプト
// ====================================================================
const GAS_API_URL = "https://script.google.com/macros/s/AKfycbwZ9kgOMzOKLyHl-LQYR8dDmIp-JBgB0BSiNjqZt-k-dnDDFEYWCXY_HmvhUoimJczU_g/exec";
const SHOP_EMAIL = "shop@example.com"; 

async function fetchGAS(action, payload = {}) {
  const options = {
    method: 'POST',
    headers: {
      'Content-Type': 'text/plain;charset=utf-8'
    },
    redirect: 'follow',
    body: JSON.stringify({ action: action, ...payload })
  };
  
  const response = await fetch(GAS_API_URL, options);
  const text = await response.text(); 
  
  try {
    const data = JSON.parse(text);
    if (!data.success) throw new Error(data.message || "処理に失敗しました");
    return data;
  } catch (e) {
    throw new Error("GAS応答エラー: " + text.substring(0, 100) + "..."); 
  }
}

window.onerror = function(msg, url, line, col, error) {
  var splash = document.getElementById('init-splash');
  if (splash) splash.style.display = 'none';
  if(typeof app !== 'undefined' && app.showAlert) {
    app.showAlert("【システムエラー発生】\n" + msg + "\n(Line: " + line + ")");
  } else {
    alert("【システムエラー発生】\n" + msg + "\n(Line: " + line + ")");
  }
};

window.addEventListener('unhandledrejection', function(event) {
  var splash = document.getElementById('init-splash');
  if (splash) splash.style.display = 'none';
  if(typeof app !== 'undefined' && app.showAlert) {
    app.showAlert("【通信エラー発生】\n" + (event.reason.message || event.reason));
  } else {
    alert("【通信エラー発生】\n" + (event.reason.message || event.reason));
  }
});
  
var app = {
  role: null,
  token: null,
  products: [],
  currentProduct: null,
  editState: { existingImages: [], existingImageNames: [], newImagesBase64: [], newImageNames: [] },
  alertCallback: null,
  
  currentTypeFilter: "all",
  currentLengthFilter: "all",
  displayLimit: 20,

  showLoading: function(show, text) { 
    document.getElementById('loading-text').innerText = text || "処理中...";
    document.getElementById('loading').style.display = show ? 'flex' : 'none'; 
  },
  
  showToast: function(message) {
    var toast = document.getElementById('toast-container');
    document.getElementById('toast-message').innerText = message;
    toast.style.bottom = '30px'; 
    setTimeout(function() { toast.style.bottom = '-100px'; }, 3000);
  },

  showAlert: function(message, callback) {
    document.getElementById('custom-alert-message').innerText = message;
    document.getElementById('custom-alert').style.display = 'flex';
    app.alertCallback = callback;
  },
  closeAlert: function() {
    document.getElementById('custom-alert').style.display = 'none';
    if(app.alertCallback) { var cb = app.alertCallback; app.alertCallback = null; cb(); }
  },

  showView: function(viewId) {
    var views = document.querySelectorAll('.view-section');
    for (var i = 0; i < views.length; i++) { views[i].classList.remove('active'); }
    document.getElementById(viewId).classList.add('active');
    window.scrollTo(0, 0); 
    
    var splash = document.getElementById('init-splash');
    if (splash) splash.style.display = 'none';
  },

  goHome: function() {
    app.setupAdminUI(app.role === 'admin');
    app.doSearch();
  },
  setRole: function(role) {
    app.role = role;
    var finalize = function() { app.doSearch(); }; 
    if (role === 'admin') {
      if(sessionStorage.getItem('adminToken')) {
        app.token = sessionStorage.getItem('adminToken');
        app.setupAdminUI(true);
        finalize();
      } else {
        app.showLoading(false);
        app.showView('view-login');
      }
    } else {
      app.setupAdminUI(false);
      finalize();
    }
  },
  setupAdminUI: function(isAdmin) {
    document.getElementById('admin-controls').style.display = isAdmin ? 'flex' : 'none'; 
    document.getElementById('btn-logout').style.display = isAdmin ? 'block' : 'none';
    var adminEls = document.querySelectorAll('.admin-only');
    for (var i = 0; i < adminEls.length; i++) { adminEls[i].style.display = isAdmin ? 'inline-block' : 'none'; }
  },
  togglePassword: function() {
    var passInput = document.getElementById('login-pass');
    var icon = document.getElementById('toggle-password-icon');
    if (passInput.type === "password") {
      passInput.type = "text";
      icon.classList.remove("bi-eye"); icon.classList.add("bi-eye-slash");
    } else {
      passInput.type = "password";
      icon.classList.remove("bi-eye-slash"); icon.classList.add("bi-eye");
    }
  },

  login: async function() {
    var id = document.getElementById('login-id').value.trim();
    var pass = document.getElementById('login-pass').value.trim();
    if(!id || !pass) return app.showAlert('IDとパスワードを入力してください');
    
    app.showLoading(true, "ログイン中...");
    try {
      const res = await fetchGAS('login', { id: id, password: pass });
      app.showLoading(false);
      app.role = 'admin'; 
      app.token = res.token;
      sessionStorage.setItem('adminToken', res.token);
      app.setupAdminUI(true);
      app.doSearch();
    } catch (err) {
      app.showLoading(false);
      app.showAlert(err.message);
    }
  },
  logout: function() {
    sessionStorage.removeItem('adminToken');
    app.token = null; 
    app.setRole('customer'); 
  },

  doSearch: function() {
    app.displayLimit = 20;
    app.loadProducts();
  },
  doSort: function() {
    app.displayLimit = 20;
    app.renderList();
  },

  loadProducts: async function() {
    var splash = document.getElementById('init-splash');
    if (!splash || splash.style.display === 'none') {
      app.showLoading(true, "データを読み込み中...");
    }
    
    try {
      const query = document.getElementById('search-input').value;
      const json = await fetchGAS('getProducts', { query: query });
      
      app.products = json.data;
      app.renderTypeFilters();
      app.renderList();
      app.showLoading(false);
      app.showView('view-list');
    } catch (err) {
      app.showLoading(false);
      if (splash) splash.style.display = 'none';
      app.showAlert("データの取得に失敗しました。\n詳細: " + err.message);
    }
  },
  
  extractLength: function(sizeStr) {
    if (!sizeStr) return 0;
    sizeStr = sizeStr.replace(/[０-９]/g, function(s) { return String.fromCharCode(s.charCodeAt(0) - 0xFEE0); });
    var match = sizeStr.match(/長[さ]?\s*:?\s*(\d+)(?:\.\d+)?/);
    if (match) return parseFloat(match[1]);
    var nums = sizeStr.match(/\d+(?:\.\d+)?/g);
    if (nums && nums.length > 0) return Math.max.apply(null, nums.map(function(n) { return parseFloat(n); }));
    return 0;
  },

  extractCategory: function(name) {
    if (!name || name === "-" || name === "名称未設定") return "";
    var cat = name.replace(/[0-9０-９一二三四五六七八九十]+枚.*/, '');
    cat = cat.split(/[\s　\(\)（）]/)[0];
    return cat.trim();
  },

  renderTypeFilters: function() {
    var container = document.getElementById('type-filters');
    container.innerHTML = '';
    var btnAll = document.createElement('button');
    btnAll.className = 'btn filter-btn ' + (app.currentTypeFilter === 'all' ? 'active' : '');
    btnAll.innerText = 'すべて';
    btnAll.onclick = function() { app.filterByType('all', this); };
    container.appendChild(btnAll);
    
    var types = new Set();
    app.products.forEach(function(p) {
      if (app.role === 'customer' && p.status === '非公開') return;
      var cat = app.extractCategory(p.name);
      if(cat) types.add(cat);
    });
    
    var typeArray = Array.from(types).sort(function(a,b){ return a.localeCompare(b, 'ja'); });
    typeArray.forEach(function(t) {
      var btn = document.createElement('button');
      btn.className = 'btn filter-btn ' + (app.currentTypeFilter === t ? 'active' : '');
      btn.innerText = t;
      btn.onclick = function() { app.filterByType(t, this); };
      container.appendChild(btn);
    });
  },

  filterByType: function(type, btnElem) {
    app.currentTypeFilter = type;
    app.displayLimit = 20; 
    var btns = document.querySelectorAll('#type-filters .btn');
    btns.forEach(function(b) { b.classList.remove('active'); });
    btnElem.classList.add('active');
    app.renderList();
  },

  filterByLength: function(filterType, btnElem) {
    app.currentLengthFilter = filterType;
    app.displayLimit = 20;
    var btns = document.querySelectorAll('#length-filters .btn');
    btns.forEach(function(b) { b.classList.remove('active'); });
    btnElem.classList.add('active');
    app.renderList();
  },

  getThumbnailUrl: function(fileId) {
    if(!fileId) return 'https://via.placeholder.com/300x200?text=No+Image';
    return 'http://lh3.googleusercontent.com/d/' + fileId;
  },

  toggleFavorite: async function(pinban, event) {
    if(event) event.stopPropagation(); 
    
    var myFavs = JSON.parse(localStorage.getItem('myFavs') || '[]');
    var isAdding = !myFavs.includes(pinban); 
    
    if (isAdding) myFavs.push(pinban);
    else myFavs = myFavs.filter(function(id) { return id !== pinban; });
    
    localStorage.setItem('myFavs', JSON.stringify(myFavs)); 
    
    var p = app.products.find(function(prod) { return prod.pinban === pinban; });
    if (p) {
      p.favoriteCount = (p.favoriteCount || 0) + (isAdding ? 1 : -1);
      if (p.favoriteCount < 0) p.favoriteCount = 0;
    }
    
    app.renderList();
    if (app.currentProduct && app.currentProduct.pinban === pinban) {
      var icon = document.getElementById('detail-fav-icon');
      var countSpan = document.getElementById('detail-fav-count');
      if(isAdding) {
        icon.className = "bi bi-heart-fill text-danger";
        countSpan.className = "ms-1 text-danger";
      } else {
        icon.className = "bi bi-heart";
        countSpan.className = "ms-1 text-dark";
      }
      countSpan.innerText = p.favoriteCount;
    }
    
    try {
      await fetchGAS('updateFavorite', { pinban: pinban, changeAmount: isAdding ? 1 : -1 });
    } catch(e) {
      console.error("お気に入り更新エラー", e);
    }
  },
