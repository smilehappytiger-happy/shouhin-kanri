<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>管理システム</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <style>
    body { background-color: #f8f9fa; overflow-x: hidden; }
    .view-section { display: none; }
    .view-section.active { display: block; }
    .thumbnail-img { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; }
    .preview-item { display: inline-flex; flex-direction: column; align-items: center; margin: 5px; width: 110px; position: relative; vertical-align: top; }
    .preview-item input { width: 100%; margin-top: 5px; font-size: 0.8rem; padding: 4px 5px; text-align: center; border-radius: 4px; border: 1px solid #ccc; }
    .preview-img { width: 100px; height: 100px; object-fit: cover; border-radius: 5px; }
    .btn-delete-img { position: absolute; top: -5px; right: -5px; padding: 0 5px; border-radius: 50%; z-index: 5; }
    .loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 9999; justify-content: center; align-items: center; color: white; flex-direction: column; }
    #init-splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #f8f9fa; z-index: 10020; display: flex; justify-content: center; align-items: center; flex-direction: column; }
    #toast-container { position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); background: rgba(40, 167, 69, 0.95); color: white; padding: 1rem 2rem; border-radius: 30px; font-weight: bold; font-size: 1.1rem; z-index: 10010; transition: bottom 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55); box-shadow: 0 10px 25px rgba(0,0,0,0.2); pointer-events: none; width: 90%; max-width: 400px; text-align: center; }
    .status-badge { position: absolute; top: 12px; left: -6px; font-size: 0.9rem; font-weight: bold; padding: 0.4rem 1.2rem; box-shadow: 2px 4px 8px rgba(0,0,0,0.3); transform: rotate(-5deg); z-index: 10; border-radius: 4px; letter-spacing: 1px; color: white; }
    .btn { transition: all 0.3s ease !important; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1) !important; border-radius: 10px !important; border: none !important; }
    .btn:hover { box-shadow: 0 8px 15px rgba(0, 0, 0, 0.2) !important; transform: translateY(-2px) !important; }
    .btn-primary { background: linear-gradient(135deg, #4dabf7, #1971c2) !important; color: white !important; }
    .btn-danger { background: linear-gradient(135deg, #ff8787, #e03131) !important; color: white !important; }
    .btn-success { background: linear-gradient(135deg, #69db7c, #2f9e44) !important; color: white !important; }
    .btn-secondary { background: linear-gradient(135deg, #ced4da, #adb5bd) !important; color: white !important; }
    .form-control-huge { padding: 1.8rem 1rem !important; font-size: 1.8rem !important; border-radius: 8px !important; }
    .search-input-huge { padding: 1.4rem !important; font-size: 1.4rem !important; border-radius: 12px 0 0 12px !important; }
    .btn-search-huge { padding: 1.4rem 2rem !important; font-size: 1.4rem !important; font-weight: bold !important; border-radius: 0 12px 12px 0 !important; }
    .btn-admin-huge { padding: 1.5rem 0 !important; font-size: 1.6rem !important; font-weight: bold !important; border-radius: 12px !important; }
    .btn-login-huge { padding: 2.5rem 1rem !important; font-size: 2.2rem !important; font-weight: bold !important; border-radius: 15px !important; background: linear-gradient(135deg, #0d6efd, #00c6ff) !important; color: white !important; box-shadow: 0 8px 15px rgba(13, 110, 253, 0.3) !important; }
    .custom-alert-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 10050; justify-content: center; align-items: center; padding: 20px; }
    .custom-alert-box { background: #fff; padding: 2.5rem; border-radius: 15px; width: 100%; max-width: 400px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); text-align: center; }
    .filter-section-title { font-size: 0.95rem; font-weight: bold; color: #555; margin-bottom: 0.3rem; border-bottom: 2px solid #ddd; padding-bottom: 0.2rem; }
    .filter-btn { border-radius: 20px !important; font-weight: bold !important; padding: 0.4rem 1rem !important; font-size: 0.9rem !important; margin-bottom: 0.4rem; background-color: white !important; color: #6c757d !important; border: 1px solid #ced4da !important; }
    .filter-btn.active { background: linear-gradient(135deg, #4dabf7, #1971c2) !important; color: white !important; border: none !important; box-shadow: inset 0 3px 5px rgba(0,0,0,0.2) !important; }
    .filter-btn-group { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 1rem; }
    .quick-edit-btn:hover { background-color: #e9ecef !important; transform: scale(1.1) !important; }
    .fav-btn { transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: flex; align-items: center; justify-content: center; }
    .fav-btn:active { transform: scale(0.8); }
    
    @media (max-width: 768px) {
      .thumbnail-img { height: 160px; }
      .search-input-huge { padding: 1rem !important; font-size: 1rem !important; border-radius: 8px 0 0 8px !important; }
      .btn-search-huge { padding: 1rem 1.2rem !important; font-size: 1rem !important; border-radius: 0 8px 8px 0 !important; }
      .btn-admin-huge { padding: 1rem 0 !important; font-size: 1.1rem !important; border-radius: 8px !important; }
      .form-control-huge { padding: 1rem !important; font-size: 1.2rem !important; }
      .btn-login-huge { padding: 1.8rem 1rem !important; font-size: 1.6rem !important; }
      .filter-btn { font-size: 0.85rem !important; padding: 0.3rem 0.8rem !important; }
      .card-body { padding: 0.8rem !important; }
      .card-title { font-size: 1rem !important; }
    }
  </style>
</head>
<body>

<div id="init-splash">
  <div class="spinner-border text-primary" role="status" style="width: 4rem; height: 4rem;"></div>
  <h4 class="mt-4 fw-bold text-secondary">システムを起動中...</h4>
</div>

<div class="loading-overlay" id="loading">
  <div class="spinner-border" role="status" style="width: 3rem; height: 3rem;"></div>
  <h5 class="mt-3 font-weight-bold" id="loading-text">処理中...</h5>
</div>

<div id="toast-container">
  <i class="bi bi-check-circle-fill me-2"></i><span id="toast-message">保存しました</span>
</div>

<div id="custom-alert" class="custom-alert-overlay">
  <div class="custom-alert-box">
    <p id="custom-alert-message" class="mb-4" style="font-size: 1.2rem; font-weight: bold; color: #333; white-space: pre-wrap; line-height: 1.6; word-break: break-all;"></p>
    <button class="btn btn-primary w-100" style="padding: 1.2rem; font-size: 1.4rem; font-weight: bold;" onclick="app.closeAlert()">OK</button>
  </div>
</div>

<nav class="navbar navbar-dark bg-primary" style="background: linear-gradient(135deg, #4dabf7, #1971c2) !important;">
  <div class="container-fluid">
    <span class="navbar-brand mb-0 h1" id="nav-title" onclick="app.goHome()" style="cursor:pointer; font-weight: bold;">管理システム</span>
    <button class="btn btn-sm btn-outline-light" id="btn-logout" style="display:none;" onclick="app.logout()">ログアウト</button>
  </div>
</nav>

<div class="container mt-3 mb-5">

  <div id="view-login" class="view-section">
    <div class="row justify-content-center">
      <div class="col-md-7 mt-5">
        <div class="card shadow-sm" style="border-radius: 15px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.1) !important;">
          <div class="card-body p-4 p-md-5">
            <h4 class="card-title text-center mb-4 mb-md-5" style="font-weight: bold;">管理者用 隠しログイン扉</h4>
            <div class="mb-4">
              <label class="form-label font-weight-bold">ログインID</label>
              <input type="text" id="login-id" inputmode="email" autocapitalize="off" class="form-control form-control-huge" placeholder="半角英数字で入力">
            </div>
            <div class="mb-5">
              <label class="form-label font-weight-bold">パスワード</label>
              <div class="input-group">
                <input type="password" id="login-pass" class="form-control form-control-huge">
                <button class="btn btn-secondary" type="button" onclick="app.togglePassword()" style="border-radius: 0 8px 8px 0 !important; padding: 0 1.5rem;">
                  <i class="bi bi-eye" id="toggle-password-icon" style="font-size: 1.5rem;"></i>
                </button>
              </div>
            </div>
            <div class="d-grid gap-4 mt-5">
              <button class="btn btn-login-huge w-100" onclick="app.login()">ログインして管理画面へ</button>
              <button class="btn btn-secondary btn-back-huge w-100" onclick="app.setRole('customer')">お客様画面に戻る</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="view-list" class="view-section">
    <div class="d-flex flex-column mb-3 gap-2">
      <div class="d-flex gap-2">
        <div class="input-group flex-grow-1">
          <input type="text" id="search-input" class="form-control search-input-huge" placeholder="商品名やサイズで検索" onkeyup="if(event.key==='Enter') app.doSearch();">
          <button class="btn btn-secondary btn-search-huge" onclick="app.doSearch()">検索</button>
        </div>
        <select id="sort-select" class="form-select" style="width: auto; border-radius: 12px; font-weight: bold; color: #495057; border: 2px solid #ced4da;" onchange="app.doSort()">
          <option value="new">新着順</option>
          <option value="fav">お気に入り数: 降順</option>
          <option value="asc">名称: 昇順</option>
          <option value="desc">名称: 降順</option>
        </select>
      </div>
      <div>
        <div class="filter-section-title mt-2">品目</div>
        <div class="filter-btn-group" id="type-filters"></div>
      </div>
      <div>
        <div class="filter-section-title">長さ</div>
        <div class="filter-btn-group" id="length-filters">
          <button class="btn filter-btn active" onclick="app.filterByLength('all', this)">すべて</button>
          <button class="btn filter-btn" onclick="app.filterByLength('under1', this)">1m未満</button>
          <button class="btn filter-btn" onclick="app.filterByLength('1to3', this)">1m〜3m</button>
          <button class="btn filter-btn" onclick="app.filterByLength('3to5', this)">3m〜5m</button>
          <button class="btn filter-btn" onclick="app.filterByLength('over5', this)">5m以上</button>
        </div>
      </div>

      <div id="admin-controls" style="display:none;" class="w-100 gap-2 mb-2">
        <button class="btn btn-success flex-grow-1 btn-admin-huge d-flex align-items-center justify-content-center" onclick="app.openEdit()">
          <i class="bi bi-plus-circle me-1"></i> 新規登録
        </button>
      </div>
    </div>
    <div class="row g-2 g-md-3" id="product-list-container"></div>
  </div>

  <div id="view-detail" class="view-section">
    <div class="d-flex gap-2 mb-3">
      <button class="btn btn-secondary" style="padding: 0.8rem 1.2rem; font-weight: bold;" onclick="app.showView('view-list')">← 一覧に戻る</button>
      <button class="btn btn-primary admin-only flex-grow-1" style="display:none; padding: 0.8rem 1.2rem; font-weight: bold;" onclick="app.editCurrent()">この商品を編集</button>
    </div>
    <div class="card shadow-sm" style="border-radius: 15px; border: none;">
      <div class="card-body p-3 p-md-4">
        <div class="row">
          <div class="col-md-6">
            <div id="productCarousel" class="carousel slide" data-bs-ride="carousel">
              <div class="carousel-inner" id="carousel-inner-container"></div>
              <button class="carousel-control-prev" type="button" data-bs-target="#productCarousel" data-bs-slide="prev">
                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Previous</span>
              </button>
              <button class="carousel-control-next" type="button" data-bs-target="#productCarousel" data-bs-slide="next">
                <span class="carousel-control-next-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Next</span>
              </button>
            </div>
          </div>
          <div class="col-md-6 mt-3 mt-md-0 position-relative">
            <div id="detail-status-area" class="mb-2"></div>
            <div class="d-flex justify-content-between align-items-start mb-3 flex-column flex-md-row gap-2">
              <h2 id="detail-name" style="font-weight: bold; margin:0; font-size: 1.6rem;">商品名</h2>
              <button id="detail-fav-btn" class="btn btn-light rounded-pill shadow-sm px-3 py-2 fav-btn" onclick="app.toggleFavorite(app.currentProduct.pinban, event)">
                <i class="bi bi-heart fs-5" id="detail-fav-icon"></i> 
                <span class="ms-2 fw-bold text-secondary" id="detail-fav-label" style="font-size: 0.9rem;">お気に入り</span>
                <span id="detail-fav-count" class="ms-2 fw-bold fs-5 text-secondary">0</span>
              </button>
            </div>
            <p class="text-muted small">品番: <span id="detail-pinban"></span></p>
            <table class="table table-sm mt-3" style="font-size: 0.9rem;">
              <tbody>
                <tr><th style="width: 30%;">サイズ</th><td id="detail-size"></td></tr>
                <tr><th>ポイント</th><td id="detail-point"></td></tr>
                <tr><th>備考</th><td id="detail-remarks" style="white-space: pre-wrap;"></td></tr>
                <tr><th>更新者</th><td id="detail-account"></td></tr>
              </tbody>
            </table>
            <button class="btn w-100 mt-2 mb-4 text-white" style="border-radius:15px; font-weight:bold; font-size:1.1rem; padding: 1rem; background: linear-gradient(135deg, #f59f00, #f08c00); box-shadow: 0 4px 10px rgba(240, 140, 0, 0.3);" onclick="app.sendInquiry()">
              <i class="bi bi-envelope-paper-heart me-2"></i>この商品について問い合わせる
            </button>
            <div class="text-center mt-2">
              <h6 style="font-weight: bold; color: #555; font-size: 0.9rem;">【商品QRコード】</h6>
              <div id="qrcode-display" class="d-inline-block p-2 bg-white border" style="border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05);"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="view-edit" class="view-section">
    <h3 id="edit-title" class="mb-4" style="font-weight: bold;">商品登録</h3>
    <div class="card shadow-sm" style="border-radius: 15px; border: none;">
      <div class="card-body p-3 p-md-4">
        
        <input type="hidden" id="edit-original-pinban">
        
        <div class="mb-4 p-3 border rounded bg-light">
          <label class="form-label font-weight-bold mb-2">販売状況 (ステータス)</label>
          <div class="d-flex gap-2 flex-wrap">
            <input type="radio" class="btn-check" name="edit-status" id="status-sale" value="販売中" autocomplete="off" checked>
            <label class="btn btn-outline-primary btn-sm" for="status-sale"><i class="bi bi-shop me-1"></i>販売中</label>
            <input type="radio" class="btn-check" name="edit-status" id="status-nego" value="商談中" autocomplete="off">
            <label class="btn btn-outline-success btn-sm" for="status-nego"><i class="bi bi-chat-dots me-1"></i>商談中</label>
            <input type="radio" class="btn-check" name="edit-status" id="status-sold" value="Sold Out" autocomplete="off">
            <label class="btn btn-outline-danger btn-sm" for="status-sold"><i class="bi bi-x-circle me-1"></i>Sold Out</label>
            <input type="radio" class="btn-check" name="edit-status" id="status-archive" value="非公開" autocomplete="off">
            <label class="btn btn-outline-secondary btn-sm" for="status-archive"><i class="bi bi-eye-slash me-1"></i>非公開 (アーカイブ)</label>
          </div>
        </div>
        
        <div class="mb-3">
          <label class="form-label font-weight-bold">品番 (ID) <span class="badge bg-danger ms-1">重要</span></label>
          <input type="text" id="edit-pinban-input" class="form-control" placeholder="新規登録時は「英字」を入力すると自動で連番が付きます（例: WOOD）">
          <div id="edit-pinban-error" class="text-danger mt-1" style="display:none; font-weight:bold; font-size: 0.85rem;">
            <i class="bi bi-exclamation-triangle-fill me-1"></i>その品番は既に使用されています。別の品番を指定してください。
          </div>
          <small class="text-muted d-block mt-1" style="font-size: 0.75rem;">※既存の品番を変更すると、お客様のお気に入り登録がリセットされる場合があります。</small>
        </div>

        <div class="mb-3">
          <label class="form-label font-weight-bold">商品名</label>
          <input type="text" id="edit-name" class="form-control" placeholder="未入力でも保存できます">
        </div>
        <div class="mb-3">
          <label class="form-label font-weight-bold">サイズ</label>
          <input type="text" id="edit-size" class="form-control" placeholder="例: 長さ4060mm×幅430mm×厚み73mm">
        </div>
        <div class="mb-3">
          <label class="form-label font-weight-bold">ポイント</label>
          <input type="text" id="edit-point" class="form-control">
        </div>
        <div class="mb-3">
          <label class="form-label font-weight-bold">備考</label>
          <textarea id="edit-remarks" class="form-control" rows="4"></textarea>
        </div>
        <div class="mb-4">
          <label class="form-label font-weight-bold">写真の追加と名称編集 (複数可)</label>
          <div class="d-flex gap-2 mb-3">
            <button type="button" class="btn btn-primary flex-grow-1 btn-photo-select" onclick="document.getElementById('input-camera').click()">
              <i class="bi bi-camera me-1"></i> カメラで撮影
            </button>
            <button type="button" class="btn btn-secondary flex-grow-1 btn-photo-select" onclick="document.getElementById('input-file').click()">
              <i class="bi bi-folder2-open me-1"></i> 端末から選択
            </button>
          </div>
          <input type="file" id="input-camera" accept="image/*" capture="environment" style="display:none;">
          <input type="file" id="input-file" accept="image/*" multiple style="display:none;">
          <small class="text-muted d-block mb-2" style="font-size: 0.8rem;">※大容量ファイルは自動的にリサイズされます。</small>
          <div id="image-preview-area" class="border p-2 rounded bg-light d-flex flex-wrap" style="min-height:120px; box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);"></div>
        </div>
        <div class="d-grid gap-3 mt-4">
          <button class="btn btn-success" style="padding: 1.2rem; font-size: 1.2rem; font-weight: bold;" onclick="app.saveProduct()">保存して反映する</button>
          <button class="btn btn-secondary" style="padding: 1rem; font-weight: bold;" onclick="app.showView('view-list')">キャンセルして戻る</button>
        </div>
      </div>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
// ====================================================================
// ★ Vercelフロントエンド 最終完全版スクリプト (スマホ最適化・お気に入り機能強化)
// ====================================================================
const GAS_API_URL = "https://script.google.com/macros/s/AKfycby4uAM-4z-mTQduCFzZpM1IhyOoj6c7avywXAq8Dwn4NzcDWt19kGg6fwkNdhPhug_xxw/exec";
const SHOP_EMAIL = "shop@example.com"; 

async function fetchGAS(action, payload = {}) {
  const options = {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    redirect: 'follow',
    body: JSON.stringify({ action: action, ...payload })
  };
  const response = await fetch(GAS_API_URL, options);
  const text = await response.text(); 
  try {
    const data = JSON.parse(text);
    if (!data.success) throw new Error(data.message || "処理に失敗しました");
    return data;
  } catch (e) {
    throw new Error("GAS応答エラー: " + text.substring(0, 100) + "..."); 
  }
}

window.onerror = function(msg, url, line, col, error) {
  var splash = document.getElementById('init-splash');
  if (splash) splash.style.display = 'none';
  if(typeof app !== 'undefined' && app.showAlert) {
    app.showAlert("【システムエラー発生】\n" + msg + "\n(Line: " + line + ")");
  } else {
    alert("【システムエラー発生】\n" + msg + "\n(Line: " + line + ")");
  }
};

window.addEventListener('unhandledrejection', function(event) {
  var splash = document.getElementById('init-splash');
  if (splash) splash.style.display = 'none';
  if(typeof app !== 'undefined' && app.showAlert) {
    app.showAlert("【通信エラー発生】\n" + (event.reason.message || event.reason));
  } else {
    alert("【通信エラー発生】\n" + (event.reason.message || event.reason));
  }
});
  
var app = {
  role: null,
  token: null,
  products: [],
  currentProduct: null,
  editState: { existingImages: [], existingImageNames: [], newImagesBase64: [], newImageNames: [] },
  alertCallback: null,
  
  currentTypeFilter: "all",
  currentLengthFilter: "all",
  displayLimit: 20,

  showLoading: function(show, text) { 
    document.getElementById('loading-text').innerText = text || "処理中...";
    document.getElementById('loading').style.display = show ? 'flex' : 'none'; 
  },
  
  showToast: function(message) {
    var toast = document.getElementById('toast-container');
    document.getElementById('toast-message').innerText = message;
    toast.style.bottom = '30px'; 
    setTimeout(function() { toast.style.bottom = '-100px'; }, 3000);
  },

  showAlert: function(message, callback) {
    document.getElementById('custom-alert-message').innerText = message;
    document.getElementById('custom-alert').style.display = 'flex';
    app.alertCallback = callback;
  },
  closeAlert: function() {
    document.getElementById('custom-alert').style.display = 'none';
    if(app.alertCallback) { var cb = app.alertCallback; app.alertCallback = null; cb(); }
  },

  showView: function(viewId) {
    var views = document.querySelectorAll('.view-section');
    for (var i = 0; i < views.length; i++) { views[i].classList.remove('active'); }
    document.getElementById(viewId).classList.add('active');
    window.scrollTo(0, 0); 
    var splash = document.getElementById('init-splash');

  extractLength: function(sizeStr) {
    if (!sizeStr) return 0;
    sizeStr = sizeStr.replace(/[０-９]/g, function(s) { return String.fromCharCode(s.charCodeAt(0) - 0xFEE0); });
    var match = sizeStr.match(/長[さ]?\s*:?\s*(\d+)(?:\.\d+)?/);
    if (match) return parseFloat(match[1]);
    var nums = sizeStr.match(/\d+(?:\.\d+)?/g);
    if (nums && nums.length > 0) return Math.max.apply(null, nums.map(function(n) { return parseFloat(n); }));
    return 0;
  },

  extractCategory: function(name) {
    if (!name || name === "-" || name === "名称未設定") return "";
    var cat = name.replace(/[0-9０-９一二三四五六七八九十]+枚.*/, '');
    cat = cat.split(/[\s　\(\)（）]/)[0];
    return cat.trim();
  },

  renderTypeFilters: function() {
    var container = document.getElementById('type-filters');
    container.innerHTML = '';
    var btnAll = document.createElement('button');
    btnAll.className = 'btn filter-btn ' + (app.currentTypeFilter === 'all' ? 'active' : '');
    btnAll.innerText = 'すべて';
    btnAll.onclick = function() { app.filterByType('all', this); };
    container.appendChild(btnAll);
    
    var types = new Set();
    app.products.forEach(function(p) {
      if (app.role === 'customer' && p.status === '非公開') return;
      var cat = app.extractCategory(p.name);
      if(cat) types.add(cat);
    });
    
    var typeArray = Array.from(types).sort(function(a,b){ return a.localeCompare(b, 'ja'); });
    typeArray.forEach(function(t) {
      var btn = document.createElement('button');
      btn.className = 'btn filter-btn ' + (app.currentTypeFilter === t ? 'active' : '');
      btn.innerText = t;
      btn.onclick = function() { app.filterByType(t, this); };
      container.appendChild(btn);
    });
  },

  toggleFavorite: async function(pinban, event) {
    if(event) event.stopPropagation(); 
    
    var myFavs = JSON.parse(localStorage.getItem('myFavs') || '[]');
    var isAdding = !myFavs.includes(pinban); 
    
    if (isAdding) myFavs.push(pinban);
    else myFavs = myFavs.filter(function(id) { return id !== pinban; });
    
    localStorage.setItem('myFavs', JSON.stringify(myFavs)); 
    
    var p = app.products.find(function(prod) { return prod.pinban === pinban; });
    if (p) {
      p.favoriteCount = (p.favoriteCount || 0) + (isAdding ? 1 : -1);
      if (p.favoriteCount < 0) p.favoriteCount = 0;
    }
    
    app.renderList();
    if (app.currentProduct && app.currentProduct.pinban === pinban) {
      var icon = document.getElementById('detail-fav-icon');
      var labelSpan = document.getElementById('detail-fav-label');
      var countSpan = document.getElementById('detail-fav-count');
      if(isAdding) {
        icon.className = "bi bi-heart-fill fs-5 text-danger";
        if(labelSpan) labelSpan.className = "ms-2 fw-bold text-danger";
        countSpan.className = "ms-2 fw-bold fs-5 text-danger";
      } else {
        icon.className = "bi bi-heart fs-5";
        if(labelSpan) labelSpan.className = "ms-2 fw-bold text-secondary";
        countSpan.className = "ms-2 fw-bold fs-5 text-secondary";
      }
      countSpan.innerText = p.favoriteCount;
    }
    
    try {
      await fetchGAS('updateFavorite', { pinban: pinban, changeAmount: isAdding ? 1 : -1 });
    } catch(e) {
      console.error("お気に入り更新エラー", e);
    }
  },

  renderList: function() {
    var container = document.getElementById('product-list-container');
    container.innerHTML = '';
    
    var filteredProducts = app.products.filter(function(p) {
       if (app.role === 'customer' && p.status === '非公開') return false;

       var len = app.extractLength(p.size);
       var matchLength = true;
       if (app.currentLengthFilter === 'under1') matchLength = (len > 0 && len < 1000);
       else if (app.currentLengthFilter === '1to3') matchLength = (len >= 1000 && len < 3000);
       else if (app.currentLengthFilter === '3to5') matchLength = (len >= 3000 && len < 5000);
       else if (app.currentLengthFilter === 'over5') matchLength = (len >= 5000);

       var matchType = true;
       if (app.currentTypeFilter !== 'all') matchType = p.name.includes(app.currentTypeFilter);
       return matchLength && matchType;
    });

    var sortType = document.getElementById('sort-select').value;
    if (sortType === 'asc') {
      filteredProducts.sort(function(a, b) { return String(a.name).localeCompare(String(b.name), 'ja'); });
    } else if (sortType === 'desc') {
      filteredProducts.sort(function(a, b) { return String(b.name).localeCompare(String(a.name), 'ja'); });
    } else if (sortType === 'fav') { // ★追加：お気に入り数による降順ソート
      filteredProducts.sort(function(a, b) { return (b.favoriteCount || 0) - (a.favoriteCount || 0); });
    } else {
      filteredProducts.sort(function(a, b) { return b.rowIdx - a.rowIdx; });
    }

    if(filteredProducts.length === 0) {
      container.innerHTML = '<p class="text-center text-muted" style="font-size:1.1rem; margin-top:2rem;">該当する商品が見つかりません。</p>';
      return;
    }

    var displayProducts = filteredProducts.slice(0, app.displayLimit);
    var myFavs = JSON.parse(localStorage.getItem('myFavs') || '[]');

    displayProducts.forEach(function(p) {
      var firstImageId = p.imageIds.length > 0 ? p.imageIds[0] : null;
      var col = document.createElement('div');
      // ★ スマホでは横幅いっぱいの2列配置になるよう最適化
      col.className = 'col-6 col-md-4 col-lg-3';
      var html = '<div class="card h-100 shadow-sm position-relative" style="cursor:pointer; border-radius:12px; border:none; transition: transform 0.2s;" onclick="app.showDetail(\'' + p.pinban + '\')">';
      
      if (p.status === "Sold Out") html += '<div class="status-badge bg-danger">Sold Out</div>';
      else if (p.status === "商談中") html += '<div class="status-badge bg-success">商談中</div>';
      else if (p.status === "非公開") html += '<div class="status-badge bg-secondary">非公開</div>';

      if (app.role === 'admin') {
        html += '<button class="btn btn-light btn-sm position-absolute quick-edit-btn" style="top: 8px; right: 8px; z-index: 10; border-radius: 50%; width: 36px; height: 36px; box-shadow: 0 4px 8px rgba(0,0,0,0.3); display: flex; justify-content: center; align-items: center;" onclick="event.stopPropagation(); app.openEdit(\'' + p.pinban + '\');" title="編集する"><i class="bi bi-pencil-fill text-primary"></i></button>';
      }

      html += '<img src="' + app.getThumbnailUrl(firstImageId) + '" class="card-img-top thumbnail-img" style="border-radius:12px 12px 0 0;">';
      
      html += '<div class="card-body p-2 p-md-3 d-flex flex-column justify-content-between">';
      html += '<div>';
      var displayName = p.name ? p.name : "-";
      html += '<h6 class="card-title text-truncate mb-1" style="font-weight:bold; font-size:1rem;">' + displayName + '</h6>';
      html += '<p class="card-text text-muted mb-0" style="font-size:0.75rem;">品番: ' + p.pinban + '</p>';
      html += '<p class="card-text text-muted mb-0 text-truncate" style="font-size:0.75rem;">サイズ: ' + (p.size ? p.size : '-') + '</p>';
      html += '</div>';

      var isFav = myFavs.includes(p.pinban);
      var heartIcon = isFav ? '<i class="bi bi-heart-fill text-danger"></i>' : '<i class="bi bi-heart text-secondary"></i>';
      var countColor = isFav ? 'text-danger' : 'text-secondary';
      // ★修正：一覧のボタンにも「お気に入り」という文字を追加
      html += '<div class="mt-2 d-flex justify-content-end"><button class="btn btn-sm btn-light rounded-pill shadow-sm fav-btn d-flex align-items-center py-1 px-2" onclick="app.toggleFavorite(\'' + p.pinban + '\', event)">' + heartIcon + '<span class="ms-1 ' + countColor + '" style="font-size:0.7rem; font-weight:600;">お気に入り</span><span class="ms-1 ' + countColor + ' fw-bold" style="font-size:0.85rem;">' + (p.favoriteCount || 0) + '</span></button></div>';

      html += '</div></div>';
      col.innerHTML = html;
      container.appendChild(col);
    });

    if (filteredProducts.length > app.displayLimit) {
      var moreBtn = document.createElement('div');
      moreBtn.className = 'col-12 text-center mt-3 mb-4';
      moreBtn.innerHTML = '<button class="btn btn-outline-primary" style="padding: 0.6rem 2rem; border-radius: 30px; font-weight: bold;" onclick="app.displayLimit += 20; app.renderList();"><i class="bi bi-chevron-down me-2"></i>さらに読み込む</button>';
      container.appendChild(moreBtn);

  // ★修正：品番の3桁-3桁ルールと完全指定ルールの追加
  saveProduct: async function() {
    let originalPinban = document.getElementById('edit-original-pinban').value;
    let inputPinban = document.getElementById('edit-pinban-input').value.trim();

    let finalPinban = "";
    
    if (!originalPinban) {
      // 【新規登録の場合】
      if (inputPinban) {
        if (inputPinban.includes('-')) {
          // ハイフンが含まれている場合（例: ICH-007）は、勝手に付け足さずそのまま使う
          finalPinban = inputPinban;
        } else {
          // ハイフンが含まれていない場合（例: ICH）は、後ろに「3桁のランダム英数字」を付ける
          const random3 = Math.random().toString(36).substring(2, 5).toUpperCase();
          finalPinban = inputPinban + "-" + random3;
        }
      } else {
        // 何も入力されなかった場合はデフォルトで「ITM-ランダム3桁」にする
        const random3 = Math.random().toString(36).substring(2, 5).toUpperCase();
        finalPinban = "ITM-" + random3;
      }
    } else {
      // 【編集の場合】
      // 入力されたものを使う（空っぽにされたら元の品番を維持）
      finalPinban = inputPinban || originalPinban; 
    }

    var data = {
      originalPinban: originalPinban,
      pinban: finalPinban,
      name: document.getElementById('edit-name').value.trim(),
      size: document.getElementById('edit-size').value,
      point: document.getElementById('edit-point').value,
      remarks: document.getElementById('edit-remarks').value,
      existingImages: app.editState.existingImages,
      existingImageNames: app.editState.existingImageNames,
      newImages: app.editState.newImagesBase64,
      newImageNames: app.editState.newImageNames,
      status: document.querySelector('input[name="edit-status"]:checked').value
    };
    
    app.showLoading(true, "保存中...");
    document.getElementById('edit-pinban-error').style.display = 'none';

    try {
      await fetchGAS('saveProduct', { data: data, token: app.token });
      app.showLoading(false);
      app.showToast("保存が完了しました");
      app.doSearch(); 
    } catch(err) {
      app.showLoading(false);
      // GAS側で重複が弾かれた場合のエラーハンドリング
      if (err.message.includes("DUPLICATE_PINBAN")) {
        document.getElementById('edit-pinban-error').style.display = 'block';
        window.scrollTo(0, 0); // 画面上部へスクロールしてエラーを見せる
      } else {
        app.showAlert("エラーが発生しました:\n" + err.message);
      }
    }
  }

window.addEventListener('DOMContentLoaded', function() {
  const urlParams = new URLSearchParams(window.location.search);
  var targetPinban = urlParams.get('pinban');
  var targetMode = urlParams.get('mode');

  if (targetMode === 'admin') {
    if(sessionStorage.getItem('adminToken')) {
      app.setRole('admin');
    } else {
      app.showLoading(false);
      app.showView('view-login');
    }
  } else if (targetPinban) {
    app.role = 'customer';
    app.setupAdminUI(false);
    var splash = document.getElementById('init-splash');
    if (!splash || splash.style.display === 'none') {
      app.showLoading(true, "データを読み込み中...");
    }
    
    fetchGAS('getProducts', { query: '' })
      .then(json => {
        app.showLoading(false);
        app.products = json.data;
        app.showDetail(targetPinban);
      })
      .catch(err => {
        app.showLoading(false);
        if (splash) splash.style.display = 'none';
        app.showAlert("エラー: " + err.message);
      });
  } else {
    app.setRole('customer');
  }

  var loginIdInput = document.getElementById('login-id');
  if(loginIdInput) {
    loginIdInput.addEventListener('input', function(e) {
      var val = e.target.value;
      val = val.replace(/[Ａ-Ｚａ-ｚ０-９]/g, function(s) { return String.fromCharCode(s.charCodeAt(0) - 0xFEE0); });
      e.target.value = val.replace(/[^a-zA-Z0-9_\-\.\@]/g, '');
    });
  }

  function handleFiles(e) {
    var files = e.target.files;
    if(files.length === 0) return;
    
    app.showLoading(true, "画像を処理中...");
    var processedCount = 0;
    var MAX_WIDTH = 1200;
    var MAX_HEIGHT = 1200;

    Array.prototype.forEach.call(files, function(file) {
      var baseName = file.name.replace(/\.[^/.]+$/, "");
      if(!baseName || baseName.toLowerCase() === "image" || baseName.startsWith("image_")) {
        baseName = "";
      }

      var reader = new FileReader();
      reader.onload = function(event) {
        var img = new Image();
        img.onload = function() {
          var width = img.width; var height = img.height;
          if (width > height) {
            if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
          } else {
            if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; }
          }
          var canvas = document.createElement('canvas');
          canvas.width = width; canvas.height = height;
          var ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          var dataUrl = canvas.toDataURL('image/jpeg', 0.8);
          
          app.editState.newImagesBase64.push(dataUrl);
          app.editState.newImageNames.push(baseName);
          
          processedCount++;
          if(processedCount === files.length) {
            app.showLoading(false);
            app.renderEditImagePreview();
            e.target.value = ''; 
          }
        }
        img.src = event.target.result;
      }
      reader.readAsDataURL(file);
    });
  }

  var inputCamera = document.getElementById('input-camera');
  var inputFile = document.getElementById('input-file');
  if (inputCamera) inputCamera.addEventListener('change', handleFiles);
  if (inputFile) inputFile.addEventListener('change', handleFiles);
});
</script>
</body>
</html>
